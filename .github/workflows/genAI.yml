name: AI Blog Writer

# This allows you to manually trigger the workflow from the GitHub UI
on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Working Title (Optional)'
        required: false
        default: 'Untitled Draft'
        type: string
      content:
        description: 'Your rough draft, notes, or brain dump'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-and-pr:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run AI Generation Pipeline
        env:
          # Pulls the secret from your repo settings
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }} 
          # Injects the text you typed into the UI
          INPUT_TITLE: ${{ inputs.title }}
          INPUT_CONTENT: ${{ inputs.content }}
        run: node generate.js

      - name: Read Generated Post Metadata
        run: |
          node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(".generated-post.json","utf8")); for (const [key,value] of Object.entries({POST_TITLE:data.title, POST_DESCRIPTION:data.description, POST_PATTERN:data.pattern, POST_PATH:data.postPath, MARKDOWN_PATH:data.markdownPath})) fs.appendFileSync(process.env.GITHUB_ENV, key + "=" + String(value).replace(/\r?\n/g, " ") + "\n");'
          rm .generated-post.json

      - name: Validate Hexo Build
        run: npm run build

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat(content): generate ai draft for '${{ env.POST_TITLE }}'"
          branch: "draft/${{ github.run_id }}"
          title: "Draft: ${{ env.POST_TITLE }}"
          body: |
            ### AI Generated Blog Draft
            
            This Pull Request contains an automated draft generated by the OpenRouter AI pipeline.
            
            **Original Input Title:** `${{ inputs.title }}`
            **Generated Title:** `${{ env.POST_TITLE }}`
            **Pattern:** `${{ env.POST_PATTERN }}`
            **Markdown:** `${{ env.MARKDOWN_PATH }}`
            **Post Path:** `${{ env.POST_PATH }}`
            **Description:** ${{ env.POST_DESCRIPTION }}
            
            #### Action Required:
            1. **Review the Markdown:** Check the `Files changed` tab to review the generated structure and tone.
            2. **Verify Formatting:** Ensure the LLM correctly applied the intended Hexo theme pattern classes.
            3. **Edit as Needed:** Make any manual tweaks directly in the web editor before merging.
            
            *Merging this PR will trigger your standard Hexo deployment pipeline.*
          labels: "content, automated"

      - name: Add Preview Links To Pull Request
        if: steps.create-pr.outputs.pull-request-number
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
          POST_PATH: ${{ env.POST_PATH }}
          POST_TITLE: ${{ env.POST_TITLE }}
          POST_PATTERN: ${{ env.POST_PATTERN }}
          MARKDOWN_PATH: ${{ env.MARKDOWN_PATH }}
          POST_DESCRIPTION: ${{ env.POST_DESCRIPTION }}
        with:
          script: |
            const prNumber = process.env.PR_NUMBER;
            const repoName = context.repo.repo;
            const owner = context.repo.owner;
            const isUserPagesRepo = repoName.toLowerCase() === `${owner.toLowerCase()}.github.io`;
            const pagesRoot = isUserPagesRepo
              ? `https://${owner}.github.io`
              : `https://${owner}.github.io/${repoName}`;
            const previewRoot = `${pagesRoot}/pr-preview/pr-${prNumber}/`;
            const postPath = process.env.POST_PATH.replace(/^\//, '');
            const previewPostUrl = `${previewRoot}${postPath}`;
            const livePostUrl = `${pagesRoot}/${postPath}`;

            const body = [
              '### AI Generated Blog Draft',
              '',
              'This Pull Request contains an automated draft generated by the OpenRouter AI pipeline.',
              '',
              `**Generated Title:** \`${process.env.POST_TITLE}\``,
              `**Pattern:** \`${process.env.POST_PATTERN}\``,
              `**Markdown:** \`${process.env.MARKDOWN_PATH}\``,
              `**Preview Post:** ${previewPostUrl}`,
              `**Preview Root:** ${previewRoot}`,
              `**Live URL After Merge:** ${livePostUrl}`,
              `**Description:** ${process.env.POST_DESCRIPTION}`,
              '',
              '#### Action Required:',
              '1. **Review the Markdown:** Check the `Files changed` tab to review the generated structure and tone.',
              '2. **Review the Preview:** Wait for the preview workflow to finish, then open the preview post URL above.',
              '3. **Edit as Needed:** Make any manual tweaks directly in the web editor before merging.',
              '',
              '*Merging this PR will update the main branch GitHub Pages deployment.*'
            ].join('\n');

            await github.rest.pulls.update({
              owner,
              repo: repoName,
              pull_number: Number(prNumber),
              body
            });
